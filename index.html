<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Clicker 2.0 Clean Edition</title>
<style>
:root{
  --bg1:#8ec5fc;
  --bg2:#e0c3fc;
  --card:rgba(255,255,255,0.92);
  --shadow:0 6px 18px rgba(0,0,0,0.15);
  --green:#43a047;
  --green2:#2e7d32;
  --text:#1f2937;
  --muted:#5b6472;
  --line:#e5e7eb;
  --accent:#4caf50;
  --warn:#ffb703;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Segoe UI,Arial,sans-serif;
  background: linear-gradient(130deg,var(--bg1),var(--bg2));
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
}
h1,h2,h3,h4,h5,h6{
  margin:0;
  color:var(--text);
}
.button, button{
  background-color:var(--accent);
  color:white;
  border:none;
  border-radius:4px;
  padding:8px 12px;
  cursor:pointer;
  box-shadow:var(--shadow);
}
.button:disabled, button:disabled{opacity:0.5;cursor:default}
.container{width:100%;max-width:800px;margin:20px auto;}
.card{background:var(--card);box-shadow:var(--shadow);border-radius:8px;padding:16px; margin:10px 0;}
.world-card{background:var(--card);box-shadow:var(--shadow);border-radius:8px;padding:12px;margin:5px 0;}
.world-card.locked{opacity:0.6;}
.world-card.active{border:2px solid var(--green2);}
.progress{height:10px;background:var(--line);border-radius:5px;overflow:hidden;}
.progress .fill{height:100%;background:var(--green2);}
#worldControls{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
</style>
</head>
<body>
  <h1>School Clicker 2.0</h1>
  <div id="worldControls"></div>
  <div class="muted" style="margin-top:8px">Všechny upgrady a ceny jsou uloženy mezi hrami.</div>
  <div id="shop"></div>
  <div class="muted" style="margin-top:8px">Peněženka: <span id="money">0</span> Kč</div>
  <button id="prestigeBtn">⭐ Prestige (lvl <span id="prestige"></span>)</button>
<script>
(() => {
  const SAVE_KEY = "school_clicker_2_clean_v1";

  const WORLD_DEFS = {
    1: {
      title: "🏫 Škola (1. svět)",
      unlockCost: 0,
      endingGoal: 10_000_000,
      upgrades: [
        { id: "sesit", label: "Sešit +1/s",       baseCost: 25,      effect: { perSecond: 1 } },
        { id: "tuzka", label: "Tužka +1/c",       baseCost: 50,      effect: { clickPower: 1 } },
        { id: "ucebnice", label: "Učebnice +3/s", baseCost: 150,     effect: { perSecond: 3 } },
        { id: "pracovni", label: "Pr. sešit +5/s", baseCost: 300,    effect: { perSecond: 5 } },
        { id: "kamarad", label: "Kamarád +5/c -10/s", baseCost: 500,   effect: { clickPower: 5, perSecondDelta: -10 } },
        { id: "lavice", label: "Lavice +10/s",    baseCost: 800,     effect: { perSecond: 10 } }
      ]
    },
    2: {
      title: "🎓 Škola (2. svět)",
      unlockCost: 100_000,
      endingGoal: 10_000_000,
      upgrades: [
        { id: "tahak",       label: "Tahák 2.0 +15/c",        baseCost: 2_000,    effect: { clickPower: 15 } },
        { id: "wifi",        label: "Školní Wi‑Fi +25/s",     baseCost: 3_500,    effect: { perSecond: 25 } },
        { id: "parta",       label: "Parta šprtů +50/s",      baseCost: 8_000,    effect: { perSecond: 50 } },
        { id: "discord",     label: "Třídní Discord +75/s",   baseCost: 12_000,   effect: { perSecond: 75 } },
        { id: "ucitel",      label: "Soukromý učitel +150/s", baseCost: 25_000,   effect: { perSecond: 150 } },
        { id: "oblibenec",   label: "Ředitelův oblíbenec +30/c", baseCost: 40_000,  effect: { clickPower: 30 } },
        { id: "guru",        label: "Maturitní guru +500/s",  baseCost: 100_000,  effect: { perSecond: 500 } }
      ]
    },
    3: {
      title: "🏙️ Univerzita (3. svět)",
      unlockCost: 10_000_000,
      endingGoal: 10_000_000_000,
      upgrades: [
        { id: "student",  label: "Student +250/s",        baseCost: 50_000,   effect: { perSecond: 250 } },
        { id: "coffee",   label: "Coffee +100/c",        baseCost: 75_000,   effect: { clickPower: 100 } },
        { id: "scripts",  label: "Scripts +750/s",        baseCost: 500_000,  effect: { perSecond: 750 } },
        { id: "energy",   label: "Energy Drink +300/c",   baseCost: 1_500_000, effect: { clickPower: 300 } },
        { id: "notebook", label: "Notebook +2 500/s",    baseCost: 5_000_000, effect: { perSecond: 2_500 } },
        { id: "senior",   label: "Senior Friend +1 000/c",baseCost: 25_000_000, effect: { clickPower: 1_000 } },
        { id: "professor",label: "Professor +10 000/s",   baseCost: 50_000_000, effect: { perSecond: 10_000 } }
      ]
    },
    4: {
      title: "🌍 Planeta (4. svět)",
      unlockCost: 100_000_000_000,
      endingGoal: 1_000_000_000_000,
      upgrades: [
        { id: "firma",       label: "Mezinárodní firma +50k/s",   baseCost: 100_000,    effect: { perSecond: 50_000 } },
        { id: "doprava",     label: "Globální doprava +150k/s",    baseCost: 300_000,    effect: { perSecond: 150_000 } },
        { id: "robotika",    label: "Robotika +500k/s",           baseCost: 800_000,    effect: { perSecond: 500_000 } },
        { id: "nanotech",    label: "Nanotechnologie +2M/s",       baseCost: 3_000_000,  effect: { perSecond: 2_000_000 } },
        { id: "bitcoin",     label: "Bitcoin +5k/c",             baseCost: 50_000,     effect: { clickPower: 5_000 } },
        { id: "autotrading", label: "AutoTrading +20k/c",        baseCost: 150_000,    effect: { clickPower: 20_000 } },
        { id: "insidertip",  label: "Insider tip +75k/c",        baseCost: 500_000,    effect: { clickPower: 75_000 } }
      ]
    },
    5: {
      title: "🌌 Vesmír (5. svět)",
      unlockCost: 10_000_000_000_000,
      endingGoal: 1_000_000_000_000_000,
      upgrades: [
        { id: "megacorp",     label: "Megakorporace +5M/s",        baseCost: 10_000_000,   effect: { perSecond: 5_000_000 } },
        { id: "letectvi",     label: "Komerční letectví +20M/s",   baseCost: 25_000_000,   effect: { perSecond: 20_000_000 } },
        { id: "automatizace", label: "Autonomní robotika +75M/s", baseCost: 75_000_000,   effect: { perSecond: 75_000_000 } },
        { id: "ai",           label: "Umělá inteligence +250M/s", baseCost: 200_000_000,  effect: { perSecond: 250_000_000 } },
        { id: "silnicni",     label: "Silniční síť +250k/c",       baseCost: 1_000_000,    effect: { clickPower: 250_000 } },
        { id: "vesmirna",     label: "Vesmírná stanice +1M/c",    baseCost: 5_000_000,    effect: { clickPower: 1_000_000 } },
        { id: "teleport",     label: "Teleport +5M/c",           baseCost: 15_000_000,   effect: { clickPower: 5_000_000 } }
      ]
    }
  };

  const defaultWorldState = (worldId) => {
    const costs = {};
    const owned = {};
    for (const u of WORLD_DEFS[worldId].upgrades) {
      costs[u.id] = u.baseCost;
      owned[u.id] = 0;
    }
    return { costs, owned };
  };

  const defaultState = () => ({
    money: 0,
    gems: 0,
    clickPower: 1,
    perSecond: 0,
    boost: 1,
    gemLuck: 1,
    activeBoosts: [],
    currentWorld: 1,
    maxUnlockedWorld: 1,
    endings: { ending1: false, ending2: false },
    stats: { clicks: 0, gemsFound: 0, tests: 0, parties: 0 },
    prestige: 0,
    prestigeCash: 1,
    worlds: {
      1: defaultWorldState(1),
      2: defaultWorldState(2),
      3: defaultWorldState(3),
      4: defaultWorldState(4),
      5: defaultWorldState(5)
    }
  });

  let state = loadState();

  function saveState() {
    localStorage.setItem(SAVE_KEY, JSON.stringify(state));
  }

  function loadState() {
    const raw = localStorage.getItem(SAVE_KEY);
    let loaded = null;
    try {
      loaded = raw ? JSON.parse(raw) : null;
    } catch {
      loaded = null;
    }
    const s = loaded && typeof loaded === "object" ? loaded : defaultState();

    // Normalizace hlavních hodnot
    s.money = Number(s.money) || 0;
    s.gems = Number(s.gems) || 0;
    s.clickPower = Number(s.clickPower) || 1;
    s.perSecond = Number(s.perSecond) || 0;
    s.boost = Number(s.boost)   || 1;
    s.gemLuck = Number(s.gemLuck) || 1;
    s.currentWorld = [1,2,3,4,5].includes(Number(s.currentWorld)) ? Number(s.currentWorld) : 1;
    s.maxUnlockedWorld = [1,2,3,4,5].includes(Number(s.maxUnlockedWorld)) ? Number(s.maxUnlockedWorld) : 1;
    s.prestige = Number(s.prestige)||0;
    s.prestigeCash = Number(s.prestigeCash)||1;

    s.endings = s.endings && typeof s.endings === "object" ? s.endings : { ending1:false, ending2:false };
    s.endings.ending1 = !!s.endings.ending1;
    s.endings.ending2 = !!s.endings.ending2;
    s.stats = s.stats && typeof s.stats === "object" ? s.stats : { clicks:0, gemsFound:0, tests:0, parties:0 };
    s.stats.clicks = Number(s.stats.clicks) || 0;
    s.stats.gemsFound = Number(s.stats.gemsFound) || 0;
    s.stats.tests = Number(s.stats.tests) || 0;
    s.stats.parties = Number(s.stats.parties) || 0;
    s.activeBoosts = Array.isArray(s.activeBoosts) ? s.activeBoosts : [];

    s.worlds = s.worlds && typeof s.worlds === "object" ? s.worlds : {};
    for (const worldId of [1,2,3,4,5]) {
      if (!s.worlds[worldId]) s.worlds[worldId] = defaultWorldState(worldId);
      if (!s.worlds[worldId].costs)  s.worlds[worldId].costs  = {};
      if (!s.worlds[worldId].owned)  s.worlds[worldId].owned  = {};
      for (const u of WORLD_DEFS[worldId].upgrades) {
        if (typeof s.worlds[worldId].costs[u.id] !== "number" || !isFinite(s.worlds[worldId].costs[u.id])) {
          s.worlds[worldId].costs[u.id] = u.baseCost;
        }
        if (typeof s.worlds[worldId].owned[u.id] !== "number" || !isFinite(s.worlds[worldId].owned[u.id])) {
          s.worlds[worldId].owned[u.id] = 0;
        }
      }
    }

    state = s;
    return s;
  }

  function update() {
    // Aktualizace UI sejde ze state
    document.getElementById("prestige").textContent = state.prestige;
    document.getElementById("money").textContent = fmt(state.money);

    document.getElementById("worldTitle").textContent = currentWorld().title;
    document.getElementById("upgradeTitle").textContent = `📚 Upgrady (${currentWorld().title.split(" ").slice(-1)[0].replace("(", "").replace(")", "")})`;

    document.getElementById("ending1").style.display = state.endings.ending1 ? "block" : "none";
    document.getElementById("ending2").style.display = state.endings.ending2 ? "block" : "none";

    renderWorldControls();
    renderShop();
    saveState();
  }

  function renderWorldControls() {
    const c = document.getElementById("worldControls");
    c.innerHTML = "";
    for (const worldId of [1,2,3,4,5]) {
      const def = WORLD_DEFS[worldId];
      const unlocked = worldId <= state.maxUnlockedWorld;
      const isCurrent = worldId === state.currentWorld;
      const cost = def.unlockCost;
      const nextWorldAllowed = worldId === state.maxUnlockedWorld + 1 || worldId <= state.maxUnlockedWorld;

      let label = "";
      let sub = "";

      if (unlocked) {
        label = isCurrent ? "Aktivní" : "Přepnout";
        sub = "Odemčeno";
      } else {
        label = "Odemknout svět " + worldId;
        sub = `${fmt(state.money)} / ${fmt(cost)} Kč`;
      }

      const pct = unlocked ? 100 : Math.min((state.money / cost) * 100, 100);
      c.innerHTML += `
        <div class="world-card ${isCurrent ? "active" : ""} ${unlocked ? "" : "locked"}">
          <h4>${def.title}</h4>
          <p>${sub}</p>
          <div class="progress" style="margin:8px 0 10px">
            <div class="fill" style="width:${pct}%"></div>
          </div>
          <button class="worldbtn" ${nextWorldAllowed ? "" : "disabled"} onclick="handleWorldButton(${worldId})">${label}</button>
        </div>
      `;
    }
  }

  function renderShop() {
    const shop = document.getElementById("shop");
    const w = worldData();
    shop.innerHTML = "";
    w.upgrades.forEach(u => {
      const cost = w.costs[u.id];
      const owned = w.owned[u.id];
      const btn = `<button onclick="buyUpgrade('${u.id}')" ${state.money >= cost ? "" : "disabled"}>${fmt(cost)} Kč</button>`;
      shop.innerHTML += `
        <div class="card">
          <h3>${u.label} (${owned})</h3>
          <p>Přidá ${u.effect.perSecond || u.effect.clickPower} ${(u.effect.perSecond) ? "Kč/s" : "Kč/klik"}.</p>
          ${btn}
        </div>`;
    });
  }

  function handleWorldButton(worldId) {
    if (worldId <= state.maxUnlockedWorld) {
      state.currentWorld = worldId;
      update();
      return;
    }
    const prevNeeded = worldId - 1;
    if (state.maxUnlockedWorld < prevNeeded) {
      const msg = (worldId === 2)
        ? "Nejdřív musíš mít svět 1."
        : `Nejdřív odemkni svět ${prevNeeded}.`;
      showMessage(msg);
      return;
    }
    const cost = WORLD_DEFS[worldId].unlockCost;
    if (state.money < cost) {
      showMessage(`Potřebuješ ${fmt(cost)} Kč na odemčení.`);
      return;
    }
    state.money -= cost;
    state.maxUnlockedWorld = worldId;
    state.currentWorld = worldId;
    showMessage(`🌍 Odemčen svět ${worldId}!`);
    update();
  }

  const PRESTIGE_COSTS = [100_000_000, 1_000_000_000, 5_000_000_000, 10_000_000_000, 20_000_000_000];
  function buyPrestige() {
    const lvl = state.prestige;
    if (lvl >= PRESTIGE_COSTS.length) {
      showMessage("Max Prestige.");
      return;
    }
    const cost = PRESTIGE_COSTS[lvl];
    if (state.money < cost) {
      showMessage("Potřebuješ více peněz.");
      return;
    }
    state.prestige++;
    if (state.prestige <= 5) state.prestigeCash *= 2.5;
    else state.prestigeCash *= 5;

    state.money=0;
    state.clickPower=1;
    state.perSecond=0;
    state.worlds = {1:defaultWorldState(1),2:defaultWorldState(2),3:defaultWorldState(3),4:defaultWorldState(4),5:defaultWorldState(5)};
    state.currentWorld = 1;
    state.maxUnlockedWorld = 1;
    showMessage("⭐ Prestige "+state.prestige+" dokončen!");
    update();
  }

  function buyUpgrade(id) {
    const world = state.worlds[state.currentWorld];
    const upgrade = WORLD_DEFS[state.currentWorld].upgrades.find(u=>u.id===id);
    const cost = world.costs[id];
    if (state.money < cost) {
      showMessage("Nedostatek peněz.");
      return;
    }
    state.money -= cost;
    world.owned[id]++;
    // efekty upgradu
    if (upgrade.effect.perSecond) state.perSecond += upgrade.effect.perSecond;
    if (upgrade.effect.clickPower) state.clickPower += upgrade.effect.clickPower;
    if (upgrade.effect.perSecondDelta) state.perSecond += upgrade.effect.perSecondDelta;
    world.costs[id] = Math.round(world.costs[id] * 1.15);
    update();
  }

  function worldData(worldId = state.currentWorld) {
    return state.worlds[worldId];
  }

  function fmt(x) {
    if (x >= 1e12) return (x/1e12).toFixed(1)+"B"; // v ČR *kalkulace potkaná* (převedeno na k*?)
    if (x >= 1e9) return (x/1e9).toFixed(1)+"mld";
    if (x >= 1e6) return (x/1e6).toFixed(1)+"mil";
    if (x >= 1e3) return (x/1e3).toFixed(1)+"tis";
    return x.toString();
  }

  function showMessage(msg) {
    alert(msg);
  }

  update();
})();
</script>
</body>
</html>
